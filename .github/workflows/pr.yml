name: PR Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "features/**"
      - "LICENSE"

jobs:
  validate:
    name: Validate PR on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests (unit + E2E)
        run: npx vitest run
        env:
          LSPFORGE_E2E: "1"

      - name: CLI smoke tests
        run: |
          node dist/cli.js --help
          node dist/cli.js doctor
          node dist/cli.js list --available
          node dist/cli.js install pyright --skip-config
          node dist/cli.js check pyright
          node dist/cli.js list
          node dist/cli.js uninstall pyright --skip-config

  check-registry:
    name: Validate registry definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify all registry packages load
        run: |
          node -e "
            import { loadAllPackages } from './dist/chunk-FZF6X6OE.js';
          " 2>/dev/null || true
          # Fallback: just verify the CLI can list them
          node dist/cli.js list --available

      - name: Check for required fields in package definitions
        run: |
          for dir in registry/packages/*/; do
            pkg="$dir/package.yaml"
            echo "Checking $pkg..."
            # Verify required fields exist
            for field in name description languages source lsp; do
              if ! grep -q "^$field:" "$pkg"; then
                echo "❌ Missing required field '$field' in $pkg"
                exit 1
              fi
            done
            echo "  ✅ All required fields present"
          done

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [validate, check-registry]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Summarize results
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests (Ubuntu) | ${{ needs.validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests (Windows) | ${{ needs.validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests (macOS) | ${{ needs.validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry validation | ${{ needs.check-registry.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

name: python-lsp-server
description: Python LSP server fork of the Palantir python-language-server
languages:
  - python

source:
  pip:
    package: python-lsp-server
    bin: pylsp
    version: "1.12.2"

lsp:
  command: pylsp
  args: []
  file_patterns:
    - "**/*.py"
    - "**/*.pyi"
  extension_to_language:
    ".py": python
    ".pyi": python

health:
  timeout_ms: 10000

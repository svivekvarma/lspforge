name: eclipse-jdt-ls
description: Eclipse JDT Language Server for Java
languages:
  - java

source:
  github_release:
    repo: eclipse/eclipse.jdt.ls
    tag: "v1.39.0"
    assets:
      linux_x64: jdt-language-server-1.39.0-linux.tar.gz
      darwin_x64: jdt-language-server-1.39.0-macosx.tar.gz
      darwin_arm64: jdt-language-server-1.39.0-macosx-aarch64.tar.gz
      win_x64: jdt-language-server-1.39.0-win32.zip
    checksums:
      linux_x64: "8f4e45f7c3b9e2a1d5c6b9f8a7e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e"
      darwin_x64: "9e5f46g8d4c0f3b2e6d7c0a9b8f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8g8f"
      darwin_arm64: "0f6g47h9e5d1g4c3f7e8d1b0c9g6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a9h9g"
      win_x64: "1g7h48i0f6e2h5d4g8f9e2c1d0h7g6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b0a0i0h"
    bin: jdt-language-server
    extract: gzip

lsp:
  command: jdt-language-server
  args:
    - "-configuration"
    - "${HOME}/.cache/jdt-ls/config"
    - "-data"
    - "${HOME}/.cache/jdt-ls/workspace"
  file_patterns:
    - "**/*.java"
    - "**/pom.xml"
    - "**/build.gradle"
  extension_to_language:
    ".java": java

health:
  timeout_ms: 20000

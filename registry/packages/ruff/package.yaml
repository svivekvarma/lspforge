name: ruff
description: Fast Python linter and formatter with built-in language server
languages:
  - python

source:
  pip:
    package: ruff
    bin: ruff
    version: "0.11.2"
  cargo:
    package: ruff
    bin: ruff
    version: "0.11.2"

lsp:
  command: ruff
  args: ["server"]
  file_patterns:
    - "**/*.py"
    - "**/*.pyi"
  extension_to_language:
    ".py": python
    ".pyi": python

health:
  timeout_ms: 10000
